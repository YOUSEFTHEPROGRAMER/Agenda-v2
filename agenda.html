            -webkit-mask-image: radial-gradient(ellipse 60% 50% at 50% 0%, #000 70%, transparent 100%);

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; scroll-behavior: smooth; }

        .hw-accel {
            will-change: transform, opacity;
            transform: translateZ(0);
        }

        @keyframes blobBounce1 {
            0%, 100% { transform: translate3d(0,0,0) scale(1); opacity: 0.3; }
            50% { transform: translate3d(30px,20px,0) scale(1.1); opacity: 0.5; }
        }
        .animate-blob-1 { animation: blobBounce1 15s infinite ease-in-out alternate; }

        @keyframes blobBounce2 {
            0%, 100% { transform: translate3d(0,0,0) scale(1); opacity: 0.2; }
            50% { transform: translate3d(-30px,-20px,0) scale(1.2); opacity: 0.4; }
        }
        .animate-blob-2 { animation: blobBounce2 18s infinite ease-in-out alternate; }

        @keyframes timelineFlow {
            0% { top: -10%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 110%; opacity: 0; }
        }
        .animate-timeline { animation: timelineFlow 4s infinite linear; }

        .spring-up { animation: springUpAnim 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes springUpAnim {
            0% { opacity: 0; transform: translateY(30px) scale(0.95); filter: blur(8px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        .slide-in { animation: slideInX 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes slideInX {
            0% { opacity: 0; transform: translate3d(calc(40px * var(--dir-sign, 1)), 0, 0); }
            100% { opacity: 1; transform: translate3d(0, 0, 0); }
        }
        html[dir="rtl"] { --dir-sign: 1; }
        html[dir="ltr"] { --dir-sign: -1; }

        .fade-out-blur { animation: fadeOutBlurAnim 0.3s ease-out forwards; pointer-events: none; }
        @keyframes fadeOutBlurAnim {
            0% { opacity: 1; transform: translateY(0); filter: blur(0); }
            100% { opacity: 0; transform: translateY(-15px); filter: blur(8px); }
        }

        @keyframes waveAnim {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-20deg); }
            75% { transform: rotate(20deg); }
        }
        .animate-wave { animation: waveAnim 2s infinite ease-in-out; transform-origin: bottom right; }

        @keyframes pulseLogo {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.15); opacity: 0.8; }
        }

                const delay = 900 + (index * 100); 
                const card = document.createElement('div');
                card.className = `snap-center shrink-0 flex items-center justify-center w-[110px] h-[65px] sm:w-full sm:h-20 md:h-24 transition-all duration-300 cursor-pointer bg-white/70 dark:bg-white/[0.02] backdrop-blur-md rounded-xl sm:rounded-2xl p-2.5 sm:p-4 border border-slate-200/80 dark:border-white/5 hover:shadow-lg hover:shadow-blue-500/10 hover:bg-white/90 dark:hover:bg-white/[0.05] hover:-translate-y-1 hover:scale-105 opacity-0 spring-up`;
                card.style.animationDelay = `${delay}ms`;
                
                const img = document.createElement('img');
                img.src = partner.src;
                img.alt = partner.alt;
                const invertClass = partner.invertDark ? 'dark:invert' : '';
                img.className = `w-full h-full object-contain opacity-70 dark:opacity-40 transition-all duration-300 filter grayscale hover:grayscale-0 scale-[1.3] sm:scale-[1.4] hover:scale-[1.5] ${invertClass}`;
                img.onerror = function() { this.outerHTML = `<span class='text-[10px] text-slate-500 font-bold'>${partner.alt}</span>`; };

                card.appendChild(img);
                partnersGrid.appendChild(card);
            });
        }

        // --- 5. التحكم في اللغات ---
        function renderLanguageMenu(currentLangCode) {
            const dropdown = document.getElementById('lang-dropdown');
            const displayBtn = document.getElementById('current-lang-display');
            
            const currentLang = LANGUAGES.find(l => l.code === currentLangCode) || LANGUAGES[0];
            displayBtn.textContent = `${currentLang.flag} ${currentLang.code.toUpperCase()}`;
            
            dropdown.innerHTML = ''; 
            LANGUAGES.forEach(lang => {
                const isSelected = lang.code === currentLangCode;
                const btn = document.createElement('button');
                btn.className = `flex items-center gap-3 px-4 py-2.5 text-sm font-medium rounded-xl transition-all duration-200 text-start w-full
                    ${isSelected ? 'bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-500 dark:to-indigo-500 text-white shadow-md' : 'text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700/50'}`;
                btn.onclick = () => setLanguage(lang.code);
                btn.innerHTML = `<span class="text-lg leading-none">${lang.flag}</span><span>${lang.name}</span>${isSelected ? `<i data-lucide="check" class="w-4 h-4 ms-auto"></i>` : ''}`;
                dropdown.appendChild(btn);
            });
            lucide.createIcons();
        }

        function toggleLangMenu(forceClose = false) {
            const langMenu = document.getElementById('lang-dropdown');
            const chevron = document.getElementById('lang-chevron');
            if (forceClose || !langMenu.classList.contains('opacity-0')) {
                langMenu.classList.add('opacity-0', 'invisible', 'scale-95', '-translate-y-2');
                chevron.classList.remove('rotate-180');
            } else {
                langMenu.classList.remove('opacity-0', 'invisible', 'scale-95', '-translate-y-2');
                chevron.classList.add('rotate-180');
            }
        }

        function setLanguage(lang) {
            currentAppLang = lang;
            localStorage.setItem('appLang', lang);
            const dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = lang;
            document.documentElement.dir = dir;

            renderLanguageMenu(lang);

            // تحديث النصوص الثابتة
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerHTML = t(key, lang);
            });

            // تحديث الأجندة
            renderTabs();
            renderEvents();

            toggleLangMenu(true);
        }

        // --- 6. أحداث الواجهة (Swipe & Clicks) ---
        function changeDay(newDayId, index) {
            if (activeDayId === newDayId) return;
            const eventsList = document.getElementById('events-list');
            eventsList.classList.add('fade-out-blur');
            
            setTimeout(() => {
                activeDayId = newDayId;
                renderTabs();
                renderEvents();
                eventsList.classList.remove('fade-out-blur');
                const tabsContainer = document.getElementById('tabs-container');
                if(tabsContainer.children[index]) tabsContainer.children[index].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }, 300);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('appLang') || 'ar';
            setLanguage(savedLang);

            const storedName = localStorage.getItem('userName');
            if (storedName) {
                document.getElementById('user-display-name').textContent = storedName;
                document.getElementById('welcome-badge').classList.remove('hidden');
                document.getElementById('welcome-badge').classList.add('flex');
            }

            document.getElementById('lang-toggle-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                toggleLangMenu();
            });
            document.addEventListener('click', (e) => {
                const langContainer = document.getElementById('lang-switcher-container');
                if (langContainer && !langContainer.contains(e.target)) toggleLangMenu(true);
            });

            // Swipe logic
            let touchstartX = 0, touchendX = 0;
            const timelineArea = document.getElementById('timeline-wrapper');
            timelineArea.addEventListener('touchstart', e => touchstartX = e.changedTouches[0].screenX, {passive: true});
            timelineArea.addEventListener('touchend', e => {
                touchendX = e.changedTouches[0].screenX;
                const threshold = 60;
                const currentIndex = agendaStructure.findIndex(d => d.id === activeDayId);
                const isRTL = document.documentElement.dir === 'rtl';
                
                if (touchendX < touchstartX - threshold) { // سحب لليسار
                    const nextIndex = isRTL ? currentIndex - 1 : currentIndex + 1;
                    if (agendaStructure[nextIndex]) changeDay(agendaStructure[nextIndex].id, nextIndex);
                } else if (touchendX > touchstartX + threshold) { // سحب لليمين
                    const nextIndex = isRTL ? currentIndex + 1 : currentIndex - 1;
                    if (agendaStructure[nextIndex]) changeDay(agendaStructure[nextIndex].id, nextIndex);
                }
            }, {passive: true});

            renderPartners();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>مرحباً بك - ملتقى الذكاء الاصطناعي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] },
                    colors: { darkBg: '#030712' },
                    animation: { 'spin-slow': 'spin 15s linear infinite' }
                }
            }
        }
    </script>

    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f8fafc; /* فاتح */
            color: #0f172a;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        html.dark body {
            background-color: #030712; /* داكن */
            color: #f8fafc;
        }

        .bg-grid {
            background-size: 24px 24px;
            background-image: 
                linear-gradient(to right, rgba(128, 128, 128, 0.07) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(128, 128, 128, 0.07) 1px, transparent 1px);
            mask-image: radial-gradient(ellipse 60% 50% at 50% 0%, #000 70%, transparent 100%);
            -webkit-mask-image: radial-gradient(ellipse 60% 50% at 50% 0%, #000 70%, transparent 100%);
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .hw-accel { will-change: transform, opacity; transform: translateZ(0); }

        @keyframes blobMotion1 {
            0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
            50% { transform: translate3d(80px, 60px, 0) scale(1.2); }
        }
        @keyframes blobMotion2 {
            0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
            50% { transform: translate3d(-70px, -50px, 0) scale(1.25); }
        }
        .animate-blob-1 { animation: blobMotion1 20s infinite ease-in-out; }
        .animate-blob-2 { animation: blobMotion2 25s infinite ease-in-out; }

        @keyframes floatParticle {
            0% { transform: translate3d(0, 0, 0) scale(1); opacity: 0; }
            20% { opacity: 0.4; transform: translate3d(0, -30px, 0) scale(1.5); }
            80% { opacity: 0.4; }
            100% { transform: translate3d(0, -150px, 0) scale(1); opacity: 0; }
        }

        .spring-enter { animation: springUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .spring-exit { animation: springDownBlur 0.5s cubic-bezier(0.36, 0, 0.66, -0.56) forwards; pointer-events: none; }
        
        @keyframes springUp {
            0% { opacity: 0; transform: translateY(20px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes springDownBlur {
            0% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
            100% { opacity: 0; transform: translateY(-20px) scale(0.98); filter: blur(10px); }
        }

        .typing-dot { animation: typeBounce 1s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typeBounce {
            0%, 100% { transform: translateY(0); opacity: 0.5; }
            50% { transform: translateY(-5px); opacity: 1; }
        }

        @keyframes checkPop {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        .animate-check { animation: checkPop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes shimmer {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .animate-shimmer { animation: shimmer 1.5s infinite linear; }

        @keyframes arrowBounceX {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(calc(-6px * var(--dir-sign, 1))); }
        }
        html[dir="rtl"] { --dir-sign: 1; }
        html[dir="ltr"] { --dir-sign: -1; }
        .animate-arrow { animation: arrowBounceX 1.2s infinite ease-in-out; }
    </style>
</head>

                welcomeDesc: '第四届国际人工智能论坛。<br>请输入您的姓名以继续。',
                namePlaceholder: '您的姓名...',
                enterAgenda: '进入议程',
                welcomeUser: '欢迎，',
                redirecting: '正在跳转至您的议程...',
                partners: '赞助商与合作伙伴'
            }
        };

        function t(key, lang) {
            return translations[lang][key] || key;
        }

        // 3. دوال الواجهة
        function renderLanguageMenu(currentLangCode) {
            const dropdown = document.getElementById('lang-dropdown');
            const displayBtn = document.getElementById('current-lang-display');
            const currentLang = LANGUAGES.find(l => l.code === currentLangCode) || LANGUAGES[0];
            
            displayBtn.textContent = `${currentLang.flag} ${currentLang.code.toUpperCase()}`;
            dropdown.innerHTML = ''; 
            
            LANGUAGES.forEach(lang => {
                const isSelected = lang.code === currentLangCode;
                const btn = document.createElement('button');
                btn.className = `flex items-center gap-3 px-4 py-2.5 text-sm font-medium rounded-xl transition-all duration-200 text-start w-full
                    ${isSelected ? 'bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-500 dark:to-indigo-500 text-white shadow-md' : 'text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700/50'}`;
                btn.onclick = () => setLanguage(lang.code);
                btn.innerHTML = `<span class="text-lg leading-none">${lang.flag}</span><span>${lang.name}</span>${isSelected ? `<i data-lucide="check" class="w-4 h-4 ms-auto"></i>` : ''}`;
                dropdown.appendChild(btn);
            });
            lucide.createIcons();
        }

        function toggleLangMenu(forceClose = false) {
            const langMenu = document.getElementById('lang-dropdown');
            const chevron = document.getElementById('lang-chevron');
            if (forceClose || !langMenu.classList.contains('opacity-0')) {
                langMenu.classList.add('opacity-0', 'invisible', 'scale-95', '-translate-y-2');
                chevron.classList.remove('rotate-180');
            } else {
                langMenu.classList.remove('opacity-0', 'invisible', 'scale-95', '-translate-y-2');
                chevron.classList.add('rotate-180');
            }
        }

        function setLanguage(lang) {
            localStorage.setItem('appLang', lang);
            const dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = lang;
            document.documentElement.dir = dir;

            renderLanguageMenu(lang);

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (el.tagName === 'INPUT' && el.hasAttribute('placeholder')) {
                    el.placeholder = t(key, lang);
                } else {
                    el.innerHTML = t(key, lang);
                }
            });
            toggleLangMenu(true);
        }

        function renderPartners() {
            const partnersData = [
                { src: "/arab-academy.png", alt: "Arab Academy", invertDark: true },
                { src: "/misr-el-kheir.png", alt: "Misr El Kheir" },
                { src: "/must.png", alt: "MUST" },
                { src: "/mawaheb.png", alt: "MAWAHEB" },
                { src: "/amg-group.png", alt: "AMG Group" }
            ];

            const partnersGrid = document.getElementById('partners-grid');
            partnersGrid.innerHTML = '';
            
            partnersData.forEach((partner, index) => {
                const delay = 900 + (index * 100); 
                const card = document.createElement('div');
                card.className = `snap-center shrink-0 flex items-center justify-center w-[110px] h-[65px] sm:w-full sm:h-20 md:h-24 transition-all duration-300 cursor-pointer bg-white/70 dark:bg-white/[0.02] backdrop-blur-md rounded-xl sm:rounded-2xl p-2.5 sm:p-4 border border-slate-200/80 dark:border-white/5 hover:shadow-lg hover:shadow-blue-500/10 hover:bg-white/90 dark:hover:bg-white/[0.05] hover:-translate-y-1 hover:scale-105 opacity-0 spring-enter`;
                card.style.animationDelay = `${delay}ms`;
                
                const img = document.createElement('img');
                img.src = partner.src;
                img.alt = partner.alt;
                const invertClass = partner.invertDark ? 'dark:invert' : '';
                img.className = `w-full h-full object-contain opacity-70 dark:opacity-40 transition-all duration-300 filter grayscale hover:grayscale-0 scale-[1.3] sm:scale-[1.4] hover:scale-[1.5] ${invertClass}`;
                img.onerror = function() { this.outerHTML = `<span class='text-[10px] text-slate-500 font-bold'>${partner.alt}</span>`; };

                card.appendChild(img);
                partnersGrid.appendChild(card);
            });
        }

        // --- 4. التشغيل ---
        document.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('appLang') || 'ar';
            setLanguage(savedLang);

            document.getElementById('lang-toggle-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                toggleLangMenu();
            });
            
            document.addEventListener('click', (e) => {
                const langContainer = document.getElementById('lang-switcher-container');
                if (langContainer && !langContainer.contains(e.target)) toggleLangMenu(true);
            });

            const particlesContainer = document.getElementById('particles-container');
            const particleColors = ['bg-indigo-400', 'bg-blue-400', 'bg-purple-400'];
            const particleCount = window.innerWidth < 768 ? 15 : 30;

            for (let i = 0; i < particleCount; i++) {
                const size = Math.random() * 4 + 2;
                const left = Math.random() * 100;
                const top = Math.random() * 100;
                const delay = Math.random() * 10;
                const duration = Math.random() * 10 + 8;
                
                const particle = document.createElement('div');
                particle.className = `absolute rounded-full pointer-events-none opacity-30 hw-accel ${particleColors[i % 3]}`;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.insetInlineStart = `${left}%`;
                particle.style.top = `${top}%`;
                particle.style.animation = `floatParticle ${duration}s ease-in-out infinite ${delay}s`;
                particle.style.boxShadow = '0 0 15px currentColor';
                particlesContainer.appendChild(particle);
            }

            renderPartners();

            const form = document.getElementById('welcome-form');
            const input = document.getElementById('user-name');
            const submitBtn = document.getElementById('submit-btn');
            const typingIndicator = document.getElementById('typing-indicator');
            const successScreen = document.getElementById('success-screen');
            const displayName = document.getElementById('display-name');
            const progressBar = document.getElementById('progress-bar');
            let typingTimeout;

            input.addEventListener('input', (e) => {
                submitBtn.disabled = e.target.value.trim().length === 0;
                typingIndicator.style.opacity = '1';
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => typingIndicator.style.opacity = '0', 800);
            });

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const name = input.value.trim();
                if (!name) return;

                input.blur();
                form.classList.remove('spring-enter');
                form.classList.add('spring-exit');
                document.getElementById('partners-section').style.opacity = '0.3';
                
                setTimeout(() => {
                    form.style.display = 'none'; 
                    displayName.textContent = name;
                    successScreen.classList.remove('hidden');
                    
                    setTimeout(() => progressBar.style.width = '100%', 100);

                    setTimeout(() => {
                        localStorage.setItem('userName', name);
                        window.location.href = 'agenda.html'; 
                    }, 2500);
                }, 500);
            });
        });
    </script>
</body>
</html>
